font:
  size: 9
  normal:
    family: JetBrainsMono Nerd Font Mono 
    style: normal
dynamic_title: true
colors:
  # Default colors
  primary:
    background: '0x28292A'
    foreground: '0xF8F8F2'

  # Cursor colors
  #
  # Colors which should be used to draw the terminal cursor. If these are unset,
  # the cursor color will be the inverse of the cell color.
  #cursor:
  #  text: '0x000000'
  #  cursor: '0xffffff'

  # Normal colors
  normal:
    black:   '0x202122'
    red:     '0xe06c75'
    green:   '0x98c379'
    yellow:  '0xF6C14D'
    blue:    '0x2494BA'
    magenta: '0xc678dd'
    cyan:    '0x56b6c2'
    white:   '0x828791'

  # Bright colors
  bright:
    black:   '0x5c6370'
    red:     '0xe06c75'
    green:   '0x98c379'
    yellow:  '0xF6C14D'
    blue:    '0x2494BA'
    magenta: '0xc678dd'
    cyan:    '0x56b6c2'
    white:   '0xe6efff'

  # Dim colors
  #
  # If the dim colors are not set, they will be calculated automatically based
  # on the `normal` colors.
  dim:
    black:   '0x202122'
    red:     '0xe06c75'
    green:   '0x98c379'
    yellow:  '0xF6C14D'
    blue:    '0x2494BA'
    magenta: '0xc678dd'
    cyan:    '0x56b6c2'
    white:   '0x828791'

  # Indexed Colors
  #
  # The indexed colors include all colors from 16 to 256.
  # When these are not set, they're filled with sensible defaults.
  #indexed_colors:
  #  - { index: 16, color: '0x000000' }
