font:
  size: 9
  normal:
    family: JetBrainsMono Nerd Font Mono 
    style: normal
dynamic_title: true
colors:
  # Default colors
  primary:
    background: '0x28292A'
    foreground: '0xF8F8F2'

  # Cursor colors
  #
  # Colors which should be used to draw the terminal cursor. If these are unset,
  # the cursor color will be the inverse of the cell color.
  #cursor:
  #  text: '0x000000'
  #  cursor: '0xffffff'

  # Normal colors
  normal:
    black:   '0x202122'
    red:     '0xE06C75'
    green:   '0x98C379'
    yellow:  '0xE5C07B'
    blue:    '0x37AAD1'
    magenta: '0xC678DD'
    cyan:    '0x56B6C2'
    white:   '0xF8F8F2'

  # Bright colors
  bright:
    black:   '0x28292A'
    red:     '0xCB444F'
    green:   '0x70AA46'
    yellow:  '0xB18A41'
    blue:    '0x167EA6'
    magenta: '0x9F43BB'
    cyan:    '0x35ACBB'
    white:   '0xF8F8F2'

